name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    # Self-hosted runner with the disk headroom needed to cross-compile
    # all 15 OS/arch combos goreleaser builds (the GitHub-hosted runner's
    # ~14GB fills up partway through the matrix). Matches fianulabs/cli.
    runs-on: fianu-ubuntu-large
    steps:
      - name: Get GitHub App token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.F_GH_DEV_BOT_APP_ID }}
          private-key: ${{ secrets.F_GH_DEV_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      # Reuses fianulabs/cli's proven private-module auth pattern: this composite
      # action checks out the repo, sets `git config insteadOf` with the app
      # token, sets GOPRIVATE=github.com/fianulabs, and runs `go mod download`
      # so module-resolution failures surface before goreleaser starts.
      - name: Setup Go with private-module auth
        uses: fianulabs/tools/integration/setup/go@v2
        with:
          gh-access-token: ${{ steps.app-token.outputs.token }}
          version: ${{ github.ref_name }}

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}

      # `release --clean` (no --snapshot) makes goreleaser publish the zips,
      # SHA256SUMS, signature, and manifest as a GitHub Release on the tag.
      - name: GoReleaser → GitHub Release
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GOPRIVATE: github.com/fianulabs
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
