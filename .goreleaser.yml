# Visit https://goreleaser.com for documentation on how to customize this
# behavior. This file follows the HashiCorp Terraform Registry scaffolding
# (https://github.com/hashicorp/terraform-provider-scaffolding-framework).
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    mod_timestamp: '{{ .CommitTimestamp }}'
    flags:
      - -trimpath
    ldflags:
      - '-s -w -X main.version={{.Version}} -X main.commit={{.Commit}}'
    # Trimmed from the 15-combo Terraform scaffolding default to the 5 OS/arch
    # combos Terraform users actually consume — this fits on stock
    # `ubuntu-latest` (~14GB disk) so we don't need a larger runner SKU.
    # Add back freebsd / 386 / arm32 / windows-arm if there's demand.
    targets:
      - linux_amd64
      - linux_arm64
      - darwin_amd64
      - darwin_arm64
      - windows_amd64
    binary: '{{ .ProjectName }}_v{{ .Version }}'

archives:
  - formats: ['zip']
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'

checksum:
  extra_files:
    - glob: 'terraform-registry-manifest.json'
      name_template: '{{ .ProjectName }}_{{ .Version }}_manifest.json'
  name_template: '{{ .ProjectName }}_{{ .Version }}_SHA256SUMS'
  algorithm: sha256

signs:
  - artifacts: checksum
    args:
      # Use GPG_FINGERPRINT in CI; the local config falls through to gpg's
      # default key when the env var is empty.
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

release:
  extra_files:
    - glob: 'terraform-registry-manifest.json'
      name_template: '{{ .ProjectName }}_{{ .Version }}_manifest.json'

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - 'Merge pull request'
      - 'Merge branch'
