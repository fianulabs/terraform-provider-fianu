name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    # Stock GitHub-hosted runner — free for public repos. The goreleaser
    # matrix in .goreleaser.yml has been trimmed to 5 OS/arch combos so it
    # fits in ubuntu-latest's ~14GB disk without needing a larger SKU.
    runs-on: ubuntu-latest
    steps:
      - name: Get GitHub App token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.F_GH_DEV_BOT_APP_ID }}
          private-key: ${{ secrets.F_GH_DEV_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      # Checkout must precede the local composite below — the runner needs
      # to read .github/actions/setup-go/action.yaml off the working tree
      # to even start the composite.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      # Local composite (./.github/actions/setup-go) sets `git config
      # insteadOf` with the app token, sets GOPRIVATE=github.com/fianulabs,
      # and runs `go mod download` so module-resolution failures surface
      # before goreleaser starts.
      - name: Setup Go with private-module auth
        uses: ./.github/actions/setup-go
        with:
          gh-access-token: ${{ steps.app-token.outputs.token }}

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v7
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PRIVATE_KEY_PASSCODE }}

      # Sanity-check the imported key can actually sign with the same flags
      # goreleaser will use. Fails fast (a few seconds) instead of after a
      # ~5-minute cross-compile if the key material is bad / passphrase wrong.
      - name: Verify GPG key is usable
        env:
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PRIVATE_KEY_PASSCODE }}
        run: |
          echo "verify-payload" > /tmp/gpg-verify.txt
          gpg --batch --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" \
              --local-user "$GPG_FINGERPRINT" \
              --output /tmp/gpg-verify.txt.sig --detach-sign /tmp/gpg-verify.txt
          gpg --verify /tmp/gpg-verify.txt.sig /tmp/gpg-verify.txt

      # `release --clean` (no --snapshot) makes goreleaser publish the zips,
      # SHA256SUMS, signature, and manifest as a GitHub Release on the tag.
      - name: GoReleaser → GitHub Release
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GOPRIVATE: github.com/fianulabs
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
