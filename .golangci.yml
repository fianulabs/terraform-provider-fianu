version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - gocritic
    - revive
    - unconvert
    - prealloc
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
    gocritic:
      disabled-checks:
        - ifElseChain
        - singleCaseSwitch
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - prealloc

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/fianulabs/terraform-provider-fianu

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
