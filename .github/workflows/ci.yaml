name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: build + vet
    # Skip on fork PRs: secrets (the F_GH_DEV_BOT app credentials) aren't
    # injected into fork-PR runs, so private-SDK auth would fail. Skipping
    # surfaces as a "skipped" status check rather than a red failure.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Get GitHub App token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.F_GH_DEV_BOT_APP_ID }}
          private-key: ${{ secrets.F_GH_DEV_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      # Checkout must precede the local composite below — the runner needs
      # to read .github/actions/setup-go/action.yaml off the working tree
      # to even start the composite.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      # Local composite (./.github/actions/setup-go) wires `git config
      # insteadOf` with the app token, sets GOPRIVATE, and runs
      # `go mod download` so private-module resolution failures surface
      # before any other step runs. Lives in-repo so the public repo has
      # no cross-org action dependency.
      - name: Setup Go with private-module auth
        uses: ./.github/actions/setup-go
        with:
          gh-access-token: ${{ steps.app-token.outputs.token }}

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

  lint:
    name: golangci-lint
    # Skip on fork PRs: secrets (the F_GH_DEV_BOT app credentials) aren't
    # injected into fork-PR runs, so private-SDK auth would fail. Skipping
    # surfaces as a "skipped" status check rather than a red failure.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Get GitHub App token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.F_GH_DEV_BOT_APP_ID }}
          private-key: ${{ secrets.F_GH_DEV_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      # Checkout must precede the local composite below — the runner needs
      # to read .github/actions/setup-go/action.yaml off the working tree
      # to even start the composite.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Go with private-module auth
        uses: ./.github/actions/setup-go
        with:
          gh-access-token: ${{ steps.app-token.outputs.token }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    name: tests (TF_ACC)
    # Skip on fork PRs: secrets (the F_GH_DEV_BOT app credentials) aren't
    # injected into fork-PR runs, so private-SDK auth would fail. Skipping
    # surfaces as a "skipped" status check rather than a red failure.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Get GitHub App token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.F_GH_DEV_BOT_APP_ID }}
          private-key: ${{ secrets.F_GH_DEV_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      # Checkout must precede the local composite below — the runner needs
      # to read .github/actions/setup-go/action.yaml off the working tree
      # to even start the composite.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Go with private-module auth
        uses: ./.github/actions/setup-go
        with:
          gh-access-token: ${{ steps.app-token.outputs.token }}

      # The fianu_control_test action's acceptance tests shell out to the
      # `terraform` binary (framework v1.16+ actions need CLI v1.14+).
      - name: Setup Terraform CLI
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.*"
          terraform_wrapper: false

      - name: Run tests
        env:
          TF_ACC: "1"
        run: go test -race -count=1 -timeout=20m ./...

  docs:
    name: docs are up to date
    # Skip on fork PRs: secrets (the F_GH_DEV_BOT app credentials) aren't
    # injected into fork-PR runs, so private-SDK auth would fail. Skipping
    # surfaces as a "skipped" status check rather than a red failure.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Get GitHub App token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.F_GH_DEV_BOT_APP_ID }}
          private-key: ${{ secrets.F_GH_DEV_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      # Checkout must precede the local composite below — the runner needs
      # to read .github/actions/setup-go/action.yaml off the working tree
      # to even start the composite.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Go with private-module auth
        uses: ./.github/actions/setup-go
        with:
          gh-access-token: ${{ steps.app-token.outputs.token }}

      - name: Regenerate docs
        run: go generate ./...

      # A schema change without `go generate` will show up as a diff against
      # the committed docs/. Fail the build so reviewers don't have to catch it.
      - name: Verify docs are clean
        run: |
          if ! git diff --quiet -- docs/; then
            echo "::error::docs/ is out of date — run 'go generate ./...' and commit the result"
            git --no-pager diff -- docs/
            exit 1
          fi
